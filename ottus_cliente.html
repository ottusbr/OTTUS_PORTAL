<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTTUS — Portal do Cliente</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --navy: #091c2b;
    --navy-light: #0d2438;
    --navy-card: #0f2a3d;
    --orange: #d85a30;
    --orange-dim: rgba(216,90,48,0.12);
    --orange-border: rgba(216,90,48,0.25);
    --text: #ffffff;
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.3);
    --border: rgba(255,255,255,0.07);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --yellow: #f59e0b;
    --yellow-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* LOADING */
  .loading-screen { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 999; }
  .loading-screen.hidden { display: none; }
  .spin { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy-light); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-size: 13px; display: flex; align-items: center; gap: 8px; transform: translateY(100px); opacity: 0; transition: all 0.25s; z-index: 300; max-width: 320px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-success { border-left: 3px solid var(--green); }
  .toast-error { border-left: 3px solid var(--red); }

  /* HEADER */
  .header { background: var(--navy-light); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; height: 60px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
  .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .header-logo svg { width: 26px; height: 26px; }
  .header-logo-text .name { font-size: 16px; font-weight: 700; color: white; letter-spacing: 0.03em; }
  .header-logo-text .sub { font-size: 9px; color: var(--orange); letter-spacing: 0.1em; text-transform: uppercase; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
  .header-user { font-size: 12px; color: var(--text-secondary); }
  .btn-logout { background: none; border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 0.35rem 0.75rem; transition: all 0.15s; }
  .btn-logout:hover { color: var(--text); border-color: var(--text-secondary); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 60px); }

  /* SIDEBAR OBRAS */
  .obras-sidebar { width: 260px; background: var(--navy-light); border-right: 0.5px solid var(--border); flex-shrink: 0; padding: 1.25rem 0; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; }
  .sidebar-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); padding: 0 1rem; margin-bottom: 0.5rem; }
  .obra-nav-item { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1rem; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
  .obra-nav-item:hover { background: rgba(255,255,255,0.04); }
  .obra-nav-item.active { background: var(--orange-dim); border-left-color: var(--orange); }
  .obra-nav-thumb { width: 32px; height: 32px; background: var(--orange-dim); border: 0.5px solid var(--orange-border); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .obra-nav-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .obra-nav-status { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }
  .obra-nav-pct { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--orange); flex-shrink: 0; }

  /* MAIN */
  .main { flex: 1; overflow: hidden; }

  /* OBRA DETAIL */
  .obra-detail { padding: 1.5rem; max-width: 960px; }

  /* OBRA HEADER */
  .obra-header { margin-bottom: 1.5rem; }
  .obra-breadcrumb { font-size: 11px; color: var(--text-tertiary); margin-bottom: 0.5rem; }
  .obra-title { font-size: 24px; font-weight: 700; margin-bottom: 0.25rem; }
  .obra-subtitle { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
  .stat-card { background: var(--navy-card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 0.4rem; }
  .stat-value { font-size: 24px; font-weight: 700; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 0.25rem; }

  /* PROGRESSO CARD */
  .progress-card { background: var(--navy-card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 1rem; }
  .progress-main { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1rem; }
  .progress-pct-big { font-size: 52px; font-weight: 800; color: var(--orange); line-height: 1; flex-shrink: 0; }
  .progress-pct-unit { font-size: 20px; color: var(--text-secondary); }
  .progress-bar-wrap { flex: 1; }
  .progress-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
  .progress-bar { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--orange); border-radius: 4px; transition: width 0.6s ease; }
  .progress-notes { font-size: 13px; color: var(--text-secondary); font-style: italic; line-height: 1.6; padding-top: 0.75rem; border-top: 0.5px solid var(--border); }

  /* GRID 2 COL */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }

  /* CHART CARD */
  .chart-card { background: var(--navy-card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .chart-wrap { height: 180px; position: relative; }

  /* PRÓXIMA VISITA */
  .next-visit-card { background: var(--navy-card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
  .next-visit-date { font-size: 28px; font-weight: 700; color: var(--orange); margin-bottom: 0.25rem; }
  .next-visit-sub { font-size: 12px; color: var(--text-secondary); margin-bottom: 1rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-outline { background: none; border: 0.5px solid var(--border); color: var(--text-secondary); }
  .btn-outline:hover { border-color: var(--orange); color: var(--orange); }
  .btn-orange { background: var(--orange); color: white; }
  .btn-orange:hover { opacity: 0.9; }
  .btn-sm { padding: 0.35rem 0.75rem; font-size: 12px; }

  /* VISITAS TIMELINE */
  .visitas-card { background: var(--navy-card); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
  .visitas-header { padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .visit-row { display: flex; align-items: center; gap: 1rem; padding: 0.85rem 1.25rem; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .visit-row:last-child { border-bottom: none; }
  .visit-row:hover { background: rgba(255,255,255,0.03); }
  .visit-date-col { text-align: center; min-width: 40px; flex-shrink: 0; }
  .visit-day { font-size: 20px; font-weight: 700; color: var(--orange); line-height: 1; }
  .visit-month { font-size: 9px; color: var(--text-tertiary); text-transform: uppercase; }
  .visit-info { flex: 1; }
  .visit-title { font-size: 13px; font-weight: 500; }
  .visit-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; display: flex; gap: 0.75rem; }
  .visit-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .visit-pct { font-size: 14px; font-weight: 700; color: var(--orange); }

  /* RELATÓRIO DETAIL */
  .relatorio-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; overflow-y: auto; }
  .relatorio-overlay.open { display: block; }
  .relatorio-panel { background: var(--navy-light); max-width: 720px; margin: 2rem auto; border-radius: var(--radius); border: 0.5px solid var(--border); min-height: calc(100vh - 4rem); }
  .rel-header { padding: 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; position: sticky; top: 0; background: var(--navy-light); z-index: 1; border-radius: var(--radius) var(--radius) 0 0; }
  .rel-header-info { flex: 1; }
  .rel-obra { font-size: 11px; color: var(--orange); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
  .rel-title { font-size: 20px; font-weight: 700; margin-bottom: 0.25rem; }
  .rel-date { font-size: 13px; color: var(--text-secondary); }
  .rel-close { background: rgba(255,255,255,0.06); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer; font-size: 18px; padding: 6px 10px; transition: all 0.15s; flex-shrink: 0; }
  .rel-close:hover { color: var(--text); }
  .rel-body { padding: 1.5rem; }
  .rel-section { margin-bottom: 1.75rem; }
  .rel-section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 0.5px solid var(--border); }
  .rel-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .rel-info-item .lbl { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.2rem; }
  .rel-info-item .val { font-size: 13px; color: var(--text); }

  /* PROGRESSO NO RELATÓRIO */
  .rel-progress { background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; display: flex; align-items: center; gap: 1.25rem; }
  .rel-pct { font-size: 40px; font-weight: 800; color: var(--orange); line-height: 1; }
  .rel-pct-bar-wrap { flex: 1; }
  .rel-pct-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin: 6px 0; }
  .rel-pct-fill { height: 100%; background: var(--orange); border-radius: 3px; }
  .rel-pct-notes { font-size: 12px; color: var(--text-secondary); font-style: italic; margin-top: 0.75rem; line-height: 1.5; }

  /* PONTOS ATENÇÃO */
  .att-item { background: rgba(255,255,255,0.03); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 0.5rem; }
  .att-num { font-size: 10px; font-weight: 700; color: var(--red); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
  .att-location { font-size: 13px; font-weight: 600; margin-bottom: 0.3rem; }
  .att-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  .att-img { width: 100%; border-radius: var(--radius-sm); margin-top: 0.75rem; max-height: 240px; object-fit: cover; cursor: pointer; }

  /* MÍDIA */
  .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .media-thumb { aspect-ratio: 16/9; background: rgba(255,255,255,0.04); border: 0.5px solid var(--border); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: background 0.15s; overflow: hidden; position: relative; }
  .media-thumb:hover { background: rgba(255,255,255,0.08); }
  .media-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .media-type-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); border-radius: 3px; font-size: 9px; padding: 2px 5px; color: white; }

  /* DRIVE LINK */
  .drive-link { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.04); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 0.85rem 1rem; text-decoration: none; color: var(--text); transition: background 0.15s; }
  .drive-link:hover { background: rgba(255,255,255,0.07); }
  .drive-link-icon { font-size: 20px; }
  .drive-link-text { font-size: 13px; font-weight: 500; }
  .drive-link-sub { font-size: 11px; color: var(--text-tertiary); }
  .drive-link-arrow { margin-left: auto; color: var(--text-tertiary); }

  /* SOLICITAÇÃO */
  .request-card { background: var(--navy-card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
  .request-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  .request-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 1rem; background: rgba(255,255,255,0.04); border: 0.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; text-align: center; }
  .request-btn:hover { background: var(--orange-dim); border-color: var(--orange-border); }
  .request-btn .icon { font-size: 24px; }
  .request-btn .label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .request-btn:hover .label { color: var(--orange); }

  /* SERVIÇOS ADICIONAIS */
  .servico-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.25rem; border-bottom: 0.5px solid var(--border); }
  .servico-item:last-child { border-bottom: none; }
  .servico-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .servico-check.included { background: var(--green-dim); border-color: var(--green); color: var(--green); font-size: 11px; }
  .servico-info { flex: 1; }
  .servico-name { font-size: 13px; font-weight: 500; }
  .servico-desc { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }
  .servico-price { font-size: 13px; font-weight: 600; color: var(--orange); flex-shrink: 0; }
  .servico-btn { background: none; border: 0.5px solid var(--orange-border); border-radius: 20px; color: var(--orange); font-size: 11px; font-weight: 500; padding: 3px 12px; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .servico-btn:hover { background: var(--orange-dim); }

  /* MODAL SOLICITAÇÃO */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 200; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--navy-light); border: 0.5px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 420px; }
  .modal-header { padding: 1rem 1.25rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 20px; }
  .modal-body { padding: 1.25rem; }
  .modal-footer { padding: 1rem 1.25rem; border-top: 0.5px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-input, .form-textarea { width: 100%; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 0.65rem 0.75rem; color: var(--text); font-size: 13px; outline: none; -webkit-appearance: none; }
  .form-input:focus, .form-textarea:focus { border-color: var(--orange); }
  .form-input::placeholder, .form-textarea::placeholder { color: rgba(255,255,255,0.2); }
  .form-textarea { resize: none; min-height: 80px; font-family: inherit; }

  /* EMPTY */
  .empty-state { padding: 3rem 1.5rem; text-align: center; color: var(--text-tertiary); }
  .empty-icon { font-size: 36px; margin-bottom: 0.75rem; }

  /* WEATHER */
  .weather-map { sunny:'☀️', partly_cloudy:'⛅', cloudy:'☁️', light_wind:'🌬', strong_wind:'💨' }

  @media (max-width: 768px) {
    .obras-sidebar { display: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    .rel-info-grid { grid-template-columns: 1fr; }
    .media-grid { grid-template-columns: repeat(2, 1fr); }
    .obra-detail { padding: 1rem; }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <svg width="32" height="32" viewBox="0 0 100 100"><path d="M10 15H90V30H62V85H52V30H38V85H28V30H10V15Z" fill="#d85a30"/></svg>
  <div class="spin"></div>
</div>

<div class="toast" id="toast"></div>

<!-- HEADER -->
<header class="header">
  <a class="header-logo" href="#">
    <svg viewBox="0 0 100 100" fill="none"><path d="M10 15H90V30H62V85H52V30H38V85H28V30H10V15Z" fill="#d85a30"/></svg>
    <div class="header-logo-text">
      <div class="name">OTTUS</div>
      <div class="sub">Portal de Obras</div>
    </div>
  </a>
  <div class="header-right">
    <span class="header-user" id="headerUser"></span>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR OBRAS -->
  <aside class="obras-sidebar" id="obrasSidebar">
    <div class="sidebar-section-label" style="margin-bottom:0.75rem">Suas obras</div>
    <div id="obrasNav"></div>
  </aside>

  <!-- MAIN -->
  <div class="main" id="mainContent">
    <div class="obra-detail" id="obraDetail">
      <div class="empty-state">
        <div class="empty-icon">🏗</div>
        <div style="font-size:15px;font-weight:600;color:var(--text-secondary)">Selecione uma obra</div>
      </div>
    </div>
  </div>

</div>

<!-- RELATÓRIO OVERLAY -->
<div class="relatorio-overlay" id="relatorioOverlay">
  <div class="relatorio-panel">
    <div class="rel-header">
      <div class="rel-header-info">
        <div class="rel-obra" id="relObra"></div>
        <div class="rel-title" id="relTitle"></div>
        <div class="rel-date" id="relDate"></div>
      </div>
      <button class="rel-close" onclick="fecharRelatorio()">×</button>
    </div>
    <div class="rel-body" id="relBody"></div>
  </div>
</div>

<!-- MODAL SOLICITAÇÃO -->
<div class="modal-overlay" id="modalSolicitacao">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalSolTitle">Solicitar visita</div>
      <button class="modal-close" onclick="closeModal('modalSolicitacao')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="solTipo"/>
      <input type="hidden" id="solSiteId"/>
      <div class="form-group">
        <label class="form-label">Data desejada</label>
        <input class="form-input" id="solData" type="date"/>
      </div>
      <div class="form-group">
        <label class="form-label">Observações (opcional)</label>
        <textarea class="form-textarea" id="solObs" placeholder="Alguma instrução especial ou motivo da solicitação..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal('modalSolicitacao')">Cancelar</button>
      <button class="btn btn-orange btn-sm" onclick="enviarSolicitacao()">Enviar solicitação</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zjjinojrghquzeqrdmoj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_uJmCKXdFbkU6-nSkYChkRQ_whLqPdE8';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let obras = [];
let obraAtiva = null;
let servicosAdicionais = [];
let progressChart = null;

const weatherLabels = { sunny:'☀️ Sol', partly_cloudy:'⛅ Parc. nublado', cloudy:'☁️ Nublado', light_wind:'🌬 Vento leve', strong_wind:'💨 Vento forte' };

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'ottus_login.html'; return; }

  const { data: u } = await sb.from('users').select('*').eq('id', session.user.id).single();
  if (!u) { await sb.auth.signOut(); window.location.href = 'ottus_login.html'; return; }

  // Admin vai para dashboard
  if (u.role === 'admin') { window.location.href = 'ottus_dashboard.html'; return; }
  // Piloto vai para formulário
  if (u.role === 'pilot') { window.location.href = 'ottus_piloto.html'; return; }

  currentUser = u;
  document.getElementById('headerUser').textContent = u.name || 'Cliente';

  await Promise.all([carregarObras(), carregarServicos()]);
  document.getElementById('loadingScreen').classList.add('hidden');
}

async function carregarObras() {
  // Busca obras que o usuário tem acesso
  const { data: acessos } = await sb
    .from('client_users')
    .select('site_id, access_level, clients(id, company_name)')
    .eq('user_id', currentUser.id);

  if (!acessos?.length) {
    document.getElementById('obrasNav').innerHTML = `<div style="padding:1rem;font-size:12px;color:var(--text-tertiary)">Nenhuma obra vinculada</div>`;
    return;
  }

  // Busca obras pelo client_id ou site_id específico
  const clientIds = [...new Set(acessos.filter(a => !a.site_id).map(a => a.clients?.id).filter(Boolean))];
  const siteIds = acessos.filter(a => a.site_id).map(a => a.site_id);

  let query = sb.from('sites').select('*').eq('status', 'active').order('name');
  if (clientIds.length && siteIds.length) {
    query = query.or(`client_id.in.(${clientIds.join(',')}),id.in.(${siteIds.join(',')})`);
  } else if (clientIds.length) {
    query = query.in('client_id', clientIds);
  } else if (siteIds.length) {
    query = query.in('id', siteIds);
  }

  const { data } = await query;
  obras = data || [];

  renderObrasNav();

  if (obras.length === 1) selecionarObra(obras[0].id);
}

async function carregarServicos() {
  const { data } = await sb.from('additional_services').select('*').eq('active', true).order('order_index');
  servicosAdicionais = data || [];
}

function renderObrasNav() {
  const el = document.getElementById('obrasNav');
  if (!obras.length) { el.innerHTML = `<div style="padding:1rem;font-size:12px;color:var(--text-tertiary)">Nenhuma obra</div>`; return; }
  el.innerHTML = obras.map(o => `
    <div class="obra-nav-item ${obraAtiva?.id === o.id ? 'active' : ''}" onclick="selecionarObra('${o.id}')">
      <div class="obra-nav-thumb">🏗</div>
      <div style="flex:1;min-width:0">
        <div class="obra-nav-name">${o.name}</div>
        <div class="obra-nav-status">${o.visit_frequency || 'Monitoramento'}</div>
      </div>
      <div class="obra-nav-pct" id="nav-pct-${o.id}">—</div>
    </div>`).join('');
  carregarPctNav();
}

async function carregarPctNav() {
  for (const o of obras) {
    const { data } = await sb.from('visits').select('progress_pct').eq('site_id', o.id).eq('status', 'published').order('visit_date', { ascending: false }).limit(1).maybeSingle();
    if (data) {
      const el = document.getElementById(`nav-pct-${o.id}`);
      if (el) el.textContent = `${data.progress_pct}%`;
    }
  }
}

async function selecionarObra(id) {
  obraAtiva = obras.find(o => o.id === id);
  if (!obraAtiva) return;
  renderObrasNav();

  const el = document.getElementById('obraDetail');
  el.innerHTML = `<div class="empty-state"><div class="spin" style="margin:0 auto"></div></div>`;

  // Carrega visitas publicadas
  const { data: visitas } = await sb
    .from('visits')
    .select('*, users!visits_pilot_id_fkey(name)')
    .eq('site_id', id)
    .eq('status', 'published')
    .order('visit_date', { ascending: false });

  // Carrega serviços contratados
  const { data: contratados } = await sb
    .from('contracted_services')
    .select('service_id')
    .eq('site_id', id);

  const contratadosIds = (contratados || []).map(c => c.service_id);

  // Última visita publicada
  const ultima = visitas?.[0];
  const pct = ultima?.progress_pct ?? 0;

  // Data próxima visita
  const proxima = obraAtiva.next_visit_date
    ? new Date(obraAtiva.next_visit_date + 'T00:00:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' })
    : null;

  el.innerHTML = `
    <!-- HEADER DA OBRA -->
    <div class="obra-header">
      <div class="obra-breadcrumb">Portal do Cliente</div>
      <div class="obra-title">${obraAtiva.name}</div>
      <div class="obra-subtitle">
        <span>${obraAtiva.address || 'Endereço não informado'}</span>
        <span class="badge badge-green"><span class="badge-dot"></span>Ativa</span>
        ${obraAtiva.visit_frequency ? `<span style="font-size:11px;color:var(--text-tertiary)">Visitas ${obraAtiva.visit_frequency}</span>` : ''}
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Progresso</div>
        <div class="stat-value" style="color:var(--orange)">${pct}%</div>
        <div class="stat-sub">última visita</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Visitas realizadas</div>
        <div class="stat-value">${visitas?.length || 0}</div>
        <div class="stat-sub">relatórios publicados</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Início</div>
        <div class="stat-value" style="font-size:16px;margin-top:4px">${obraAtiva.start_date ? new Date(obraAtiva.start_date + 'T00:00:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' }) : '—'}</div>
        <div class="stat-sub">monitoramento</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Previsão término</div>
        <div class="stat-value" style="font-size:16px;margin-top:4px">${obraAtiva.expected_end_date ? new Date(obraAtiva.expected_end_date + 'T00:00:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short', year: '2-digit' }) : '—'}</div>
        <div class="stat-sub">estimado</div>
      </div>
    </div>

    <!-- PROGRESSO + GRÁFICO -->
    <div class="grid-2">
      <div class="progress-card">
        <div class="card-title">Avanço da obra</div>
        <div class="progress-main">
          <div><span class="progress-pct-big">${pct}</span><span class="progress-pct-unit">%</span></div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-label"><span>Início</span><span>Conclusão</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
        ${ultima?.progress_notes ? `<div class="progress-notes">"${ultima.progress_notes}"</div>` : ''}
      </div>

      <div class="chart-card">
        <div class="card-title">Evolução do progresso</div>
        <div class="chart-wrap">
          <canvas id="progressChart"></canvas>
        </div>
      </div>
    </div>

    <!-- PRÓXIMA VISITA + SOLICITAÇÕES -->
    <div class="grid-2">
      <div class="next-visit-card">
        <div class="card-title">Próxima visita</div>
        ${proxima ? `
          <div class="next-visit-date">${proxima}</div>
          <div class="next-visit-sub">${obraAtiva.visit_frequency || 'Visita programada'}</div>
        ` : `
          <div class="next-visit-date" style="font-size:16px;color:var(--text-secondary)">A definir</div>
          <div class="next-visit-sub">Aguardando agendamento</div>
        `}
        <div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="abrirSolicitacao('anticipation')">⏩ Antecipar visita</button>
          <button class="btn btn-outline btn-sm" onclick="abrirSolicitacao('additional')">+ Visita adicional</button>
        </div>
      </div>

      <div class="request-card">
        <div class="card-title" style="margin-bottom:0.75rem">Serviços disponíveis</div>
        <div id="servicosList"></div>
      </div>
    </div>

    <!-- HISTÓRICO DE VISITAS -->
    <div class="visitas-card">
      <div class="visitas-header">
        <div class="card-title" style="margin:0">Relatórios de visita</div>
        ${obraAtiva.drive_folder_url ? `<a href="${obraAtiva.drive_folder_url}" target="_blank" class="btn btn-outline btn-sm">📁 Drive</a>` : ''}
      </div>
      <div id="visitasList">
        ${!visitas?.length ? `<div class="empty-state"><div class="empty-icon">📋</div><div>Nenhum relatório publicado ainda</div></div>` :
          visitas.map(v => {
            const d = new Date(v.visit_date + 'T00:00:00');
            return `
              <div class="visit-row" onclick="abrirRelatorio('${v.id}')">
                <div class="visit-date-col">
                  <div class="visit-day">${d.getDate().toString().padStart(2,'0')}</div>
                  <div class="visit-month">${d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','')}</div>
                </div>
                <div class="visit-info">
                  <div class="visit-title">Relatório de visita — ${d.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'})}</div>
                  <div class="visit-meta">
                    <span>👤 ${v.users?.name || 'Piloto'}</span>
                    ${v.weather ? `<span>${weatherLabels[v.weather] || ''}</span>` : ''}
                  </div>
                </div>
                <div class="visit-right">
                  ${v.progress_pct != null ? `<div class="visit-pct">${v.progress_pct}%</div>` : ''}
                  <span style="font-size:11px;color:var(--text-tertiary)">Ver relatório →</span>
                </div>
              </div>`;
          }).join('')
        }
      </div>
    </div>
  `;

  // Renderiza serviços
  renderServicos(contratadosIds);

  // Renderiza gráfico de evolução
  if (visitas?.length > 1) {
    const dadosGrafico = [...visitas].reverse().filter(v => v.progress_pct != null);
    renderGrafico(dadosGrafico);
  }
}

function renderServicos(contratadosIds) {
  const el = document.getElementById('servicosList');
  if (!el) return;
  if (!servicosAdicionais.length) { el.innerHTML = `<div style="font-size:12px;color:var(--text-tertiary)">Nenhum serviço disponível</div>`; return; }
  el.innerHTML = servicosAdicionais.map(s => {
    const incluido = contratadosIds.includes(s.id);
    return `
      <div class="servico-item">
        <div class="servico-check ${incluido ? 'included' : ''}">
          ${incluido ? '✓' : ''}
        </div>
        <div class="servico-info">
          <div class="servico-name">${s.name}</div>
          <div class="servico-desc">${incluido ? 'Incluído no contrato' : (s.description || '')}</div>
        </div>
        ${!incluido ? `<button class="servico-btn" onclick="solicitarServico('${s.id}','${s.name}')">Solicitar</button>` : ''}
      </div>`;
  }).join('');
}

function renderGrafico(visitas) {
  const ctx = document.getElementById('progressChart');
  if (!ctx) return;
  if (progressChart) progressChart.destroy();
  progressChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: visitas.map(v => new Date(v.visit_date + 'T00:00:00').toLocaleDateString('pt-BR', { day: 'numeric', month: 'short' })),
      datasets: [{
        data: visitas.map(v => v.progress_pct),
        borderColor: '#d85a30',
        backgroundColor: 'rgba(216,90,48,0.1)',
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointBackgroundColor: '#d85a30',
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } } },
        y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 }, callback: v => v + '%' } }
      }
    }
  });
}

async function abrirRelatorio(visitaId) {
  const { data: v } = await sb.from('visits').select('*, sites(name, drive_folder_url), users!visits_pilot_id_fkey(name)').eq('id', visitaId).single();
  if (!v) return;

  const { data: points } = await sb.from('attention_points').select('*').eq('visit_id', visitaId).order('order_index');
  const { data: media } = await sb.from('media').select('*').eq('visit_id', visitaId).order('order_index');

  const d = new Date(v.visit_date + 'T00:00:00');
  document.getElementById('relObra').textContent = v.sites?.name || '—';
  document.getElementById('relTitle').textContent = `Relatório de visita — ${d.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' })}`;
  document.getElementById('relDate').textContent = `Publicado em ${new Date(v.published_at).toLocaleDateString('pt-BR')}`;

  const typeLabel = { photo_external:'📸 Externo', photo_internal:'📸 Interno', video_external:'🎬 Externo', video_fpv:'🎬 FPV', tour_360:'360°', timelapse:'⏱ Timelapse' };

  document.getElementById('relBody').innerHTML = `

    <!-- RESUMO EXECUTIVO -->
    <div style="background:linear-gradient(135deg,rgba(216,90,48,0.08),rgba(216,90,48,0.04));border:0.5px solid var(--orange-border);border-radius:var(--radius-sm);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;gap:1.5rem;flex-wrap:wrap">
      <div style="flex:1;min-width:100px">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:4px">Progresso</div>
        <div style="font-size:22px;font-weight:800;color:var(--orange)">${v.progress_pct ?? '—'}%</div>
      </div>
      <div style="flex:1;min-width:100px">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:4px">Pontos registrados</div>
        <div style="font-size:22px;font-weight:800;color:${points?.some(p=>p.description?.startsWith('[CRÍTICO]')) ? 'var(--red)' : points?.length ? 'var(--text)' : 'var(--text-tertiary)'}">${points?.length || 0}</div>
      </div>
      <div style="flex:1;min-width:100px">
        <div style="font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:4px">Duração</div>
        <div style="font-size:22px;font-weight:800">${v.start_time && v.end_time ? (() => { const diff = Math.round((new Date('2000-01-01T'+v.end_time) - new Date('2000-01-01T'+v.start_time))/60000); return diff > 0 ? diff + ' min' : '—'; })() : '—'}</div>
      </div>
      <div style="flex:2;min-width:160px;display:flex;align-items:center">
        ${points?.some(p=>p.description?.startsWith('[CRÍTICO]')) 
          ? `<div style="background:var(--red-dim);border:0.5px solid rgba(239,68,68,0.3);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:12px;color:var(--red);font-weight:600">⚠ Esta visita contém pontos críticos — verifique os pontos de atenção</div>`
          : points?.some(p=>p.description?.startsWith('[ATENÇÃO]'))
          ? `<div style="background:var(--yellow-dim);border:0.5px solid rgba(245,158,11,0.3);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:12px;color:var(--yellow);font-weight:600">⚠ Esta visita contém pontos de atenção</div>`
          : `<div style="background:var(--green-dim);border:0.5px solid rgba(34,197,94,0.3);border-radius:var(--radius-sm);padding:0.5rem 0.75rem;font-size:12px;color:var(--green);font-weight:600">✓ Visita sem pontos críticos registrados</div>`
        }
      </div>
    </div>

    <!-- IDENTIFICAÇÃO -->
    <div class="rel-section">
      <div class="rel-section-title">Identificação da visita</div>
      <div class="rel-info-grid">
        <div class="rel-info-item"><div class="lbl">Piloto</div><div class="val">${v.users?.name || '—'}</div></div>
        <div class="rel-info-item"><div class="lbl">Recebeu na obra</div><div class="val">${v.site_contact || '—'}</div></div>
        <div class="rel-info-item"><div class="lbl">Horário</div><div class="val">${v.start_time ? v.start_time.substring(0,5) : '—'}${v.end_time ? ' → ' + v.end_time.substring(0,5) : ''}</div></div>
        <div class="rel-info-item"><div class="lbl">Condições climáticas</div><div class="val">${weatherLabels[v.weather] || '—'}</div></div>
        ${v.general_notes ? `<div class="rel-info-item" style="grid-column:span 2"><div class="lbl">Observações gerais</div><div class="val">${(() => {
          const n = v.general_notes;
          const m = n.match(/^Canteiro: (Organizado|Parcialmente organizado|Desorganizado)\.?\s*/);
          if (!m) return `<span style="color:var(--text-secondary);font-style:italic">${n}</span>`;
          const val = m[1];
          const cor = val==='Organizado'?'var(--green)':val==='Parcialmente organizado'?'var(--yellow)':'var(--red)';
          const bg = val==='Organizado'?'var(--green-dim)':val==='Parcialmente organizado'?'var(--yellow-dim)':'var(--red-dim)';
          const em = val==='Organizado'?'✅':val==='Parcialmente organizado'?'⚠️':'🚧';
          const resto = n.replace(m[0],'').trim();
          return '<span style="display:inline-flex;align-items:center;gap:5px;background:'+bg+';border:0.5px solid '+cor+';border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;color:'+cor+'">'+em+' '+val+'</span>'+(resto?'<div style="margin-top:4px;color:var(--text-secondary);font-style:italic">'+resto+'</div>':'');
        })()}</div></div>` : ''}
      </div>
    </div>

    <!-- PROGRESSO -->
    <div class="rel-section">
      <div class="rel-section-title">Progresso da obra</div>
      <div class="rel-progress">
        <div class="rel-pct">${v.progress_pct ?? '—'}%</div>
        <div class="rel-pct-bar-wrap">
          <div style="font-size:11px;color:var(--text-secondary)">Avanço registrado nesta visita</div>
          <div class="rel-pct-bar"><div class="rel-pct-fill" style="width:${v.progress_pct ?? 0}%"></div></div>
        </div>
      </div>
      ${v.progress_notes ? `<div class="rel-pct-notes">"${v.progress_notes}"</div>` : ''}
    </div>

    <!-- PONTOS DE ATENÇÃO -->
    <div class="rel-section">
      <div class="rel-section-title">Pontos de atenção ${points?.length ? `(${points.length})` : ''}</div>
      ${!points?.length
        ? `<div style="font-size:13px;color:var(--text-tertiary)">Nenhum ponto de atenção registrado nesta visita</div>`
        : points.map(p => {
          const desc = p.description || '';
          let urgLabel = '', urgColor = 'var(--text-tertiary)', urgBg = 'rgba(255,255,255,0.05)';
          let descClean = desc;
          if (desc.startsWith('[CRÍTICO] ')) {
            urgLabel = '🔴 Crítico'; urgColor = 'var(--red)'; urgBg = 'var(--red-dim)';
            descClean = desc.replace('[CRÍTICO] ', '');
          } else if (desc.startsWith('[ATENÇÃO] ')) {
            urgLabel = '⚠ Atenção'; urgColor = 'var(--yellow)'; urgBg = 'var(--yellow-dim)';
            descClean = desc.replace('[ATENÇÃO] ', '');
          }
          return `
          <div class="att-item">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <div class="att-num">Ponto ${p.order_index}</div>
              ${urgLabel ? `<span style="font-size:11px;font-weight:600;color:${urgColor};background:${urgBg};padding:1px 8px;border-radius:20px">${urgLabel}</span>` : ''}
            </div>
            ${p.location ? `<div class="att-location">${p.location}</div>` : ''}
            <div class="att-desc">${descClean}</div>
            ${p.image_url ? `<img class="att-img" src="${p.image_url}" onclick="window.open('${p.image_url}','_blank')" style="cursor:pointer"/>` : ''}
          </div>`;
        }).join('')
      }
    </div>

    <!-- MÍDIA -->
    <div class="rel-section">
      <div class="rel-section-title">Registro visual ${media?.length ? `(${media.length} arquivos)` : ''}</div>
      ${!media?.length
        ? `<div style="font-size:13px;color:var(--text-secondary)">As mídias completas (fotos e vídeos 4K) estão disponíveis na pasta do Google Drive abaixo.</div>`
        : `<div class="media-grid">${media.map(m => `
            <div class="media-thumb" onclick="window.open('${m.url}','_blank')">
              ${m.thumbnail_url ? `<img src="${m.thumbnail_url}"/>` : '🎬'}
              <span class="media-type-badge">${typeLabel[m.type] || m.type}</span>
            </div>`).join('')}</div>`
      }
    </div>

    <!-- DRIVE -->
    ${v.sites?.drive_folder_url ? `
    <div class="rel-section">
      <div class="rel-section-title">Materiais completos</div>
      <a class="drive-link" href="${v.sites.drive_folder_url}" target="_blank">
        <span class="drive-link-icon">📁</span>
        <div>
          <div class="drive-link-text">Acessar pasta no Google Drive</div>
          <div class="drive-link-sub">Fotos e vídeos em alta resolução sem marca d'água</div>
        </div>
        <span class="drive-link-arrow">↗</span>
      </a>
    </div>` : ''}
  `;

  document.getElementById('relatorioOverlay').classList.add('open');
  document.getElementById('relatorioOverlay').scrollTop = 0;
}

function fecharRelatorio() {
  document.getElementById('relatorioOverlay').classList.remove('open');
}

function abrirSolicitacao(tipo) {
  if (!obraAtiva) return;
  document.getElementById('solTipo').value = tipo;
  document.getElementById('solSiteId').value = obraAtiva.id;
  document.getElementById('modalSolTitle').textContent = tipo === 'additional' ? 'Solicitar visita adicional' : 'Antecipar visita';
  document.getElementById('solData').value = '';
  document.getElementById('solObs').value = '';
  openModal('modalSolicitacao');
}

function solicitarServico(serviceId, serviceName) {
  document.getElementById('solTipo').value = 'additional';
  document.getElementById('solSiteId').value = obraAtiva?.id || '';
  document.getElementById('modalSolTitle').textContent = `Solicitar: ${serviceName}`;
  document.getElementById('solObs').value = `Interesse em contratar: ${serviceName}`;
  openModal('modalSolicitacao');
}

async function enviarSolicitacao() {
  const tipo = document.getElementById('solTipo').value;
  const siteId = document.getElementById('solSiteId').value;
  const data = document.getElementById('solData').value;
  const obs = document.getElementById('solObs').value.trim();

  const { error } = await sb.from('visit_requests').insert({
    site_id: siteId,
    requested_by: currentUser.id,
    type: tipo,
    desired_date: data || null,
    notes: obs || null,
    status: 'pending',
  });

  if (error) { toast('Erro ao enviar solicitação', 'error'); return; }
  toast('Solicitação enviada! Entraremos em contato em breve.', 'success');
  closeModal('modalSolicitacao');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => { m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }); });
document.getElementById('relatorioOverlay').addEventListener('click', e => { if (e.target === document.getElementById('relatorioOverlay')) fecharRelatorio(); });
function toast(msg, type = 'success') { const el = document.getElementById('toast'); el.className = `toast toast-${type} show`; el.innerHTML = `${type === 'success' ? '✓' : '⚠'} ${msg}`; setTimeout(() => el.classList.remove('show'), 3500); }
async function logout() { await sb.auth.signOut(); window.location.href = 'ottus_login.html'; }

init();
</script>
</body>
</html>
